  #     - bff-service-app
  #   restart: unless-stopped
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #     - /app/.next

  catalog-service-app:
    build:
      context: .
      dockerfile: backend/services/catalog_service/Dockerfile
    container_name: catalog-service-app
    expose:
      - "3005"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - APP_PORT=3005
      - MONGO_URI_CATALOG=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@catalog-mongo:27017/catalog_db?authSource=admin
      - MONGO_DB_CATALOG=catalog_db
      - KAFKA_BROKERS=kafka:9092

  order-history-service-app:
    build:
      context: .
      dockerfile: backend/services/order_history_service/Dockerfile
    container_name: order-history-service-app
    expose:
      - "3006"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - APP_PORT=3006
      - MONGO_URI_ORDER_HISTORY=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@catalog-mongo:27017/order_history_db?authSource=admin
      - MONGO_DB_ORDER_HISTORY=order_history_db
      - KAFKA_BROKERS=kafka:9092

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service-app:
    build:
      context: .
      dockerfile: backend/services/ai_service/Dockerfile
    container_name: ai-service-app
    expose:
      - "50051"
      - "8000"
    depends_on:
      qdrant:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - GRPC_PORT=50051
      - HTTP_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - KAFKA_BROKERS=kafka:9092
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:
  huggingface_cache:

