services:
  db:
    image: postgres:17
    container_name: main-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB_NAMES}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # รหัส Cluster (บังคับใส่สำหรับโหมด KRaft)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: catalog-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: catalog_db
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s # Application Services

  auth-service-app:
    build:
      context: .
      dockerfile: backend/services/auth_service/Dockerfile
    container_name: auth-service-app
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_PORT=3001
      - DB_HOST_AUTH=db
      - DB_PORT_AUTH=5432
      - DB_NAME_AUTH=auth_db
      - DB_USER_AUTH=${APP_DB_USER}
      - DB_PASSWORD_AUTH=${APP_DB_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

  product-service-app:
    build:
      context: .
      dockerfile: backend/services/product_service/Dockerfile
    container_name: product-service-app
    expose:
      - "3002"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - APP_PORT=3002
      - DB_HOST_PRODUCT=db
      - DB_PORT_PRODUCT=5432
      - DB_NAME_PRODUCT=product_db
      - DB_USER_PRODUCT=${APP_DB_USER}
      - DB_PASSWORD_PRODUCT=${APP_DB_PASSWORD}
      - KAFKA_BROKERS=kafka:9092
  order-service-app:
    build:
      context: .
      dockerfile: backend/services/order_service/Dockerfile
    container_name: order-service-app
    expose:
      - "3003"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - APP_PORT=3003
      - DB_HOST_ORDER=db
      - DB_PORT_ORDER=5432
      - DB_NAME_ORDER=order_db
      - DB_USER_ORDER=${APP_DB_USER}
      - DB_PASSWORD_ORDER=${APP_DB_PASSWORD}
      - KAFKA_BROKERS=kafka:9092
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CATALOG_SERVICE_URL=http://catalog-service-app:3005

  cart-service-app:
    build:
      context: .
      dockerfile: backend/services/cart_service/Dockerfile
    container_name: cart-service-app
    expose:
      - "3004"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_PORT=3004
      - DB_HOST_CART=db
      - DB_PORT_CART=5432
      - DB_NAME_CART=cart_db
      - DB_USER_CART=${APP_DB_USER}
      - DB_PASSWORD_CART=${APP_DB_PASSWORD}
  bff-service-app:
    build:
      context: .
      dockerfile: backend/bff/Dockerfile
    container_name: bff-service-app
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      # REST Proxy — backend service URLs (ใช้ container name เป็น hostname)
      - AUTH_SERVICE_URL=auth-service-app:3001
      - PRODUCT_SERVICE_URL=product-service-app:3002
      - ORDER_SERVICE_URL=order-service-app:3003
      - CART_SERVICE_URL=cart-service-app:3004
      - CATALOG_SERVICE_URL=catalog-service-app:3005
      - ORDER_HISTORY_SERVICE_URL=order-history-service-app:3006
      # gRPC — AI service
      - AI_SERVICE_URL=ai-service-app:50051
      - ALLOWED_ORIGINS=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth-service-app
      - product-service-app
      - order-service-app
      - cart-service-app
      - catalog-service-app
      - order-history-service-app
      - ai-service-app

  # frontend-app:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: frontend-app
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_BFF_URL=http://localhost:8080
  #     - BFF_URL=http://bff-service-app:8080
